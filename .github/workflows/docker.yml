name: Docker

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (tag/branch/sha) to build from
        required: true
        default: main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - uses: docker/setup-buildx-action@v4.2.0

      - uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            COMMIT_SHA=${{ inputs.ref || github.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./apps/web/package.json').version")" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4.2.0

      - uses: docker/login-action@v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        env:
          HEAD_SHA: ${{ inputs.ref || github.sha }}
        run: |
          shopt -s nullglob
          digest_files=(*)
          if ((${#digest_files[@]} == 0)); then
            echo "No image digests were downloaded" >&2
            exit 1
          fi

          images=()
          for digest in "${digest_files[@]}"; do
            images+=("${REGISTRY}/${IMAGE_NAME}@sha256:${digest}")
          done

          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE_NAME}:latest" \
            -t "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            -t "${REGISTRY}/${IMAGE_NAME}:${HEAD_SHA}" \
            "${images[@]}"

      - name: Verify manifest
        run: |
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:latest"
